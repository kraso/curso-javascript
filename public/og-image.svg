<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
    <line x1="0" y1="630" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
  </g>

  <!-- Decorative circle -->
  <circle cx="1050" cy="150" r="280" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.06"/>

  <!-- JS Logo badge -->
  <rect x="80" y="60" width="72" height="72" rx="14" fill="url(#accent)"/>
  <text x="116" y="108" font-family="monospace" font-weight="800" font-size="36" fill="#0a0a0a" text-anchor="middle">JS</text>

  <!-- Code decoration -->
  <text x="80" y="260" font-family="monospace" font-size="16" fill="#F59E0B" opacity="0.25">&lt;script&gt;</text>
  <text x="100" y="286" font-family="monospace" font-size="14" fill="#61afef" opacity="0.2">  const</text>
  <text x="100" y="310" font-family="monospace" font-size="14" fill="#98c379" opacity="0.2">  aprendiendo =</text>
  <text x="100" y="334" font-family="monospace" font-size="14" fill="#e5c07b" opacity="0.2">    true;</text>
  <text x="80" y="370" font-family="monospace" font-size="16" fill="#F59E0B" opacity="0.25">&lt;/script&gt;</text>

  <!-- Main title -->
  <text x="80" y="440" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="52" fill="#FFFFFF" letter-spacing="-1.5">
    JavaScript
  </text>

  <!-- Subtitle -->
  <text x="80" y="500" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="28" fill="#a1a1aa" letter-spacing="-0.5">
    está en tus manos
  </text>

  <!-- Label -->
  <rect x="80" y="530" width="200" height="36" rx="18" fill="#F59E0B" opacity="0.15"/>
  <text x="180" y="554" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="600" font-size="16" fill="#F59E0B" text-anchor="middle">Curso Interactivo</text>

  <!-- Decorative line -->
  <line x1="80" y1="588" x2="1120" y2="588" stroke="#2a2a2a" stroke-width="1"/>

  <!-- URL -->
  <text x="80" y="615" font-family="'JetBrains Mono', 'Cascadia Code', monospace" font-weight="400" font-size="14" fill="#525252">javascript-learning-app.dev</text>
</svg>
