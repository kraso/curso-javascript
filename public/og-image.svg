<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <g fill="#ffffff" opacity="0.015">
    <circle cx="100" cy="100" r="1.5"/>
    <circle cx="300" cy="200" r="1.5"/>
    <circle cx="500" cy="80" r="1.5"/>
    <circle cx="700" cy="150" r="1.5"/>
    <circle cx="900" cy="100" r="1.5"/>
    <circle cx="1100" cy="200" r="1.5"/>
    <circle cx="150" cy="400" r="1.5"/>
    <circle cx="350" cy="500" r="1.5"/>
    <circle cx="550" cy="450" r="1.5"/>
    <circle cx="750" cy="550" r="1.5"/>
    <circle cx="950" cy="400" r="1.5"/>
    <circle cx="1060" cy="520" r="1.5"/>
  </g>

  <!-- Decorative circle -->
  <circle cx="1000" cy="315" r="320" fill="none" stroke="#F59E0B" stroke-width="0.5" opacity="0.06"/>

  <!-- JS Logo badge -->
  <rect x="60" y="60" width="64" height="64" rx="12" fill="#F59E0B"/>
  <text x="92" y="100" font-family="monospace" font-weight="800" font-size="32" fill="#0a0a0a" text-anchor="middle">JS</text>

  <!-- Decorative line -->
  <line x1="60" y1="570" x2="1140" y2="570" stroke="url(#line)" stroke-width="1.5"/>

  <!-- JavaScript (white) -->
  <text x="600" y="340" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="76" fill="#fafafa" text-anchor="middle" letter-spacing="-2">JavaScript</text>

  <!-- está en tus manos (amber gradient) -->
  <text x="600" y="430" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="44" fill="url(#amber)" text-anchor="middle" letter-spacing="-1">está en tus manos</text>

  <!-- Sub-label -->
  <rect x="440" y="468" width="320" height="40" rx="20" fill="#F59E0B" opacity="0.1"/>
  <text x="600" y="495" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="600" font-size="18" fill="#F59E0B" text-anchor="middle">Curso Interactivo de JavaScript</text>

  <!-- URL -->
  <text x="600" y="600" font-family="'SF Mono', 'JetBrains Mono', 'Cascadia Code', monospace" font-weight="400" font-size="13" fill="#525252" text-anchor="middle">www.javascript-learning-app.dev</text>
</svg>
